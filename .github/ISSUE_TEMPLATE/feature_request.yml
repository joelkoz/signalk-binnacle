name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please provide enough detail to evaluate the use case and how it would fit the webapp.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What's the use case?
      placeholder: |
        While sailing at night I need...
        Currently, Binnacle doesn't support...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this feature to work?
      placeholder: |
        Binnacle should add...
        It would work by...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternative Solutions
      description: Have you considered any alternative solutions or workarounds?

  - type: dropdown
    id: category
    attributes:
      label: Feature Category
      description: What part of the webapp does this touch?
      options:
        - Chart Rendering (WebGL, layers, styling)
        - Chart Sources (providers, formats)
        - Navigation Data (vessel, AIS, instruments)
        - Routes and Waypoints
        - User Interface (controls, themes, touch)
        - Signal K Integration (paths, subscriptions)
        - Performance Improvement
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      options:
        - Critical (blocking my use case)
        - High (important for my workflow)
        - Medium (nice to have)
        - Low (minor enhancement)
    validations:
      required: true

  - type: textarea
    id: examples
    attributes:
      label: Examples or References
      description: Links to similar features in other chartplotters, specifications, or documentation
      placeholder: |
        Similar to how Freeboard-SK does...
        Signal K path convention: ...

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      description: Would you be willing to help with this feature?
      options:
        - label: I would like to implement this feature myself
        - label: I can help test this feature
        - label: I can help with documentation

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission Checklist
      description: Please verify the following before submitting
      options:
        - label: I have checked existing issues and discussions to avoid duplicates
          required: true
        - label: I have provided a clear use case and problem statement
          required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or mockups that would help explain this feature
