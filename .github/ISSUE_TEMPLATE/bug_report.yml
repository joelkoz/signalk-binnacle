name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below so the issue can be reproduced and triaged.
        For usage questions, please use [Discussions](https://github.com/NearlCrews/signalk-binnacle/discussions) instead.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: The chart goes blank when zooming past level 14 with the depth layer enabled.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Numbered steps that consistently trigger the bug.
      placeholder: |
        1. Open Binnacle from the Signal K webapps list
        2. Enable the depth layer
        3. Zoom in past level 14
        4. Observe the blank chart
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
    validations:
      required: true

  - type: input
    id: webapp-version
    attributes:
      label: Binnacle Version
      description: Which version of signalk-binnacle are you using?
      placeholder: "0.8.0"
    validations:
      required: true

  - type: input
    id: signalk-version
    attributes:
      label: Signal K Server Version
      description: Which version of Signal K server are you running?
      placeholder: "2.27.0"
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Installation Method
      description: How did you install Binnacle?
      options:
        - Signal K App Store
        - npm install
        - From source (git clone)
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser and Version
      description: Which browser shows the problem? Include the version if you know it.
      placeholder: Chrome 137, Safari on iPadOS 18
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device and Operating System
      description: The device the browser runs on, not the server.
      placeholder: iPad Pro, Windows 11 laptop, Raspberry Pi 5 touchscreen
    validations:
      required: true

  - type: textarea
    id: console
    attributes:
      label: Browser Console Output
      description: Open the browser developer tools and paste any errors or warnings from the console.
      render: shell

  - type: textarea
    id: charts
    attributes:
      label: Chart Sources
      description: Optional. If the bug involves specific charts, describe the chart sources or providers in use.
      placeholder: signalk-charts plugin with local MBTiles, OpenSeaMap online

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission Checklist
      description: Please verify the following before submitting
      options:
        - label: I have checked existing issues to avoid duplicates
          required: true
        - label: I have included all relevant information above
          required: true
        - label: I have redacted any sensitive information (positions, tokens)
          required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, possible causes, or anything else helpful.
