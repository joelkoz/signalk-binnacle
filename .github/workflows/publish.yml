name: Publish to npm

# Fires when a GitHub release is created (the v<version> tag). Builds the production webapp into
# public/ and publishes the tarball to npm with a provenance attestation. Binnacle has no prepare
# or prepack lifecycle script (per the Signal K pack-banner caveat), so the build is an explicit
# step before publish rather than a lifecycle hook.

on:
  release:
    types: [created]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: biomejs/setup-biome@v2
        with:
          version: 2.5.0
      # Fail fast when the release tag and the package.json version disagree, so a release can never
      # publish a version that does not match its tag. The tag arrives through an env var (not inline
      # interpolation) so it cannot be expanded as shell.
      - name: Verify the release tag matches the package.json version
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG="${TAG_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "Release tag ($TAG) does not match package.json version ($PKG_VERSION)" >&2
            exit 1
          fi
      - run: npm ci
      - run: npm run check
      - run: npm run ci:biome
      - run: npm run cruise
      - run: npm test
      - run: npm run build
        env:
          NODE_ENV: production

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    # id-token: write lets npm attach a provenance attestation to the published package;
    # contents: read is the least privilege the checkout needs.
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          cache: npm
      - run: npm ci
      # Build into public/ before publishing, since files ships public/ and there is no prepack hook.
      - run: npm run build
        env:
          NODE_ENV: production
      # --access public is required for the first publish of a new package when generating
      # provenance; for later versions it is the default for an unscoped public package.
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
