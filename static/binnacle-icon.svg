<?xml version="1.0" encoding="UTF-8"?>
<!--
  Signal K plugin icon for signalk-binnacle.

  Family identity (shared across @NearlCrews Signal K plugins): rounded
  square with a deep-ocean gradient and three stacked stylized wave lines.
  Per-project differentiation: a bottom-right circle badge in a
  project-specific color with a 2-3 shape glyph.

  This variant's badge: a WHITE compass-card badge with the four-point
  rose in the family glyph dark and a chart-green pivot. The white
  card makes the flagship chartplotter the brightest, most
  instrument-like badge in the family lineup, like a compass card lit
  in its housing; the ocean-dark ring replaces the usual white ring so
  the badge still separates from the background.

  Sibling badges already in use: crimson (Crow's Nest), yellow (Virtual
  Weather), orange (NMEA 2000 Emitter), violet (OpenRouter Companion).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Binnacle plugin icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E4D6B"/>
      <stop offset="1" stop-color="#1A8DAB"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square background, deep-ocean gradient -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Family motif: three stacked wave lines centered in the canvas -->
  <g fill="none" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" opacity="0.94">
    <path d="M 80,176 q 44,-36 88,0 t 88,0 t 88,0 t 88,0"/>
    <path d="M 80,256 q 44,-36 88,0 t 88,0 t 88,0 t 88,0"/>
    <path d="M 80,336 q 44,-36 88,0 t 88,0 t 88,0 t 88,0"/>
  </g>

  <!-- Project badge: bottom-right circle (white compass card) -->
  <circle cx="388" cy="388" r="84" fill="#FFFFFF" stroke="#1B3A4B" stroke-width="8"/>

  <!--
    Badge glyph: four-point compass rose centered on (388, 388) in the
    family glyph dark, with a chart-green pivot dot tying the flagship
    to the green used on its sibling candidates.
  -->
  <path fill="#1B3A4B" d="M 388 332 L 402 374 L 444 388 L 402 402 L 388 444 L 374 402 L 332 388 L 374 374 Z"/>
  <circle cx="388" cy="388" r="8" fill="#43A047"/>
</svg>
